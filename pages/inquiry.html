<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<meta property="og:title" content="審査状況照会">
	<meta property="og:description" content="審査状況の照会">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://af3c.reale-korobka.com/pages/inquiry.html">
	<meta property="og:image" content="https://data.reale-korobka.com/images/AF3C_logo.png">
	<meta property="og:site_name" content="農林漁業金融公庫">

	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="審査状況照会">
	<meta name="twitter:description" content="審査状況の照会">
	<meta name="twitter:image" content="https://data.reale-korobka.com/images/AF3C_logo.png">
	<meta name="robots" content="noindex, nofollow">

	<link rel="stylesheet" href="../css/reset.css">
	<link rel="stylesheet" href="../css/style.css">
	<link rel="icon" href="https://data.reale-korobka.com/images/AF3C_favicon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
	<title>審査状況照会</title>
</head>
<body>
	<main>
		<header>
			<h1>審査状況照会</h1>
			<span class="subtitle">Agriculture Forestry and Fisheries Finance Corporation</span>
			<nav>
				<ul>
					<li><a href="../">ホーム</a></li>
					<li><a href="description.html">融資制度</a></li>
					<li><a href="financing.html" class="borrow">融資申請</a></li>
					<li><a href="inquiry.html" class="borrow">審査状況照会</a></li>
				</ul>
			</nav>
		</header>
		<section id="status-check">
			<h2>融資状況・履歴照会</h2>
			<p>ご自身の融資状況や返済額を確認するには、Discordでログインしてください。</p>

			<div id="discord-login-section" class="form-group text-center mt-30">
				<button type="button" onclick="openDiscordLogin()" id="discordLoginBtn" class="discord-btn-large">
					Discordでログインして照会
				</button>
			</div>

			<div id="loading-section" class="loading-box" style="display: none;">
				データを取得しています...
			</div>

			<div id="status-result" style="display: none;">
			</div>
		</section>

		<script>
		function openDiscordLogin() {
			const clientId = '1478317793689473127';
			const redirectUri = encodeURIComponent('https://af3c-api.reale-korobka.com/auth/callback');
			const url = `https://discord.com/api/oauth2/authorize?client_id=${clientId}&redirect_uri=${redirectUri}&response_type=code&scope=identify`;

			const width = 500, height = 700;
			const left = (window.screen.width / 2) - (width / 2);
			const top = (window.screen.height / 2) - (height / 2);
			window.open(url, 'DiscordLogin', `width=${width},height=${height},top=${top},left=${left}`);
		}

		window.addEventListener('message', async (event) => {
			if (event.origin !== 'https://af3c-api.reale-korobka.com') return;

			if (event.data && event.data.type === 'DISCORD_AUTH_SUCCESS') {
				document.getElementById('discord-login-section').style.display = 'none';
				document.getElementById('loading-section').style.display = 'block';

				try {
					const res = await fetch('https://af3c-api.reale-korobka.com/status', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify({ authToken: event.data.token })
					});
					const data = await res.json();
					renderLoans(data.loans);
				} catch (e) {
					alert('通信エラーが発生しました。');
					document.getElementById('discord-login-section').style.display = 'block';
				} finally {
					document.getElementById('loading-section').style.display = 'none';
				}
			}
		});

		function renderLoans(loans) {
			const resultDiv = document.getElementById('status-result');
			resultDiv.style.display = 'block';

			if (!loans || loans.length === 0) {
				resultDiv.innerHTML = '<div class="status-none">該当する融資データが見つかりません。</div>';
				return;
			}

			let html = '';
			loans.forEach(loan => {
				let statusClass = '', statusText = '';
				if (loan.status === 'approved') {
					statusClass = 'status-approved';
					statusText = '【可決・送金済】';
				} else if (loan.status === 'pending') {
					statusClass = 'status-pending';
					statusText = '【審査中】';
				} else if (loan.status === 'rejected') {
					statusClass = 'status-rejected';
					statusText = '【見送り】';
				}

				html += `
					<div class="loan-card ${statusClass}">
						<div class="loan-card-header">
							${statusText} <span class="loan-card-no">${loan.applicationNo}</span>
						</div>
						<div class="loan-card-grid">
							<p class="loan-card-item"><strong>借入額:</strong><br>€ ${loan.amount.toLocaleString()}</p>
							${loan.status === 'approved' ? `
								<p class="loan-card-item"><strong>最終返済額:</strong><br>€ ${loan.total.toLocaleString()}</p>
								<p class="loan-card-item loan-card-item-full"><strong>返済目安日:</strong> ${loan.deadline}</p>
							` : ''}
						</div>
						<p class="loan-card-plan"><strong>事業計画:</strong> ${loan.plan.length > 40 ? loan.plan.substring(0, 40) + '...' : loan.plan}</p>
					</div>
				`;
			});
			resultDiv.innerHTML = html;
		}
		</script>
		<footer>
			このサイトは架空のものです。
		</footer>
	</main>
</body>
