<!DOCTYPE html>
<html lang="ja">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<meta property="og:title" content="融資制度について">
	<meta property="og:description" content="農林漁業金融公庫のウェブサイトへようこそ">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://af3c.reale-korobka.com/pages/inquiry.html">
	<meta property="og:image" content="https://data.reale-korobka.com/images/AF3C_logo.png">
	<meta property="og:site_name" content="農林漁業金融公庫">

	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="融資制度について">
	<meta name="twitter:description" content="農林漁業金融公庫のウェブサイトへようこそ">
	<meta name="twitter:image" content="https://data.reale-korobka.com/images/AF3C_logo.png">
	<meta name="robots" content="noindex, nofollow">

	<link rel="stylesheet" href="../css/reset.css">
	<link rel="stylesheet" href="../css/style.css">
	<link rel="icon" href="https://data.reale-korobka.com/images/AF3C_favicon.png">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
	<title>審査状況照会</title>
</head>
<body>
	<main>
		<header>
			<h1>審査状況照会</h1>
			<span class="subtitle">Agriculture Forestry and Fisheries Finance Corporation</span>
			<nav>
				<ul>
					<li><a href="../">ホーム</a></li>
					<li><a href="description.html">融資制度</a></li>
					<li><a href="financing.html" class="borrow">融資申請</a></li>
					<li><a href="inquiry.html" class="borrow">審査状況照会</a></li>
				</ul>
			</nav>
		</header>
		<section id="status-check">
			<h2>融資実行公告・審査状況照会</h2>
			<p>申請時にお控えいただいた「受付番号」を入力してください。</p>

			<div class="status-form-group">
				<input type="text" id="checkNo" placeholder="例: 農林-2026-xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
				<button onclick="checkStatus()" class="status-btn">照会</button>
			</div>

			<div id="status-result">
			</div>
		</section>

		<script>
		async function checkStatus() {
			const no = document.getElementById('checkNo').value.trim();
			const resultDiv = document.getElementById('status-result');
			const btn = document.querySelector('#status-check button');

			if(!no) {
				alert("受付番号を入力してください。");
				return;
			}

			btn.innerText = "照会中...";
			btn.disabled = true;

			try {
				const res = await fetch(`https://af3c-api.reale-korobka.com/status?no=${no}`);
				const data = await res.json();

				resultDiv.style.display = 'block';

				if(data.status === 'approved') {
					resultDiv.style.background = '#e8f5e9';
					resultDiv.style.border = '2px solid #4caf50';
					resultDiv.style.color = '#2e7d32';
					resultDiv.innerHTML = `【可決・送金済】<br><span style="font-size:0.9rem; font-weight:normal;">対象の融資は承認され、ゲーム内口座等への送金手続きが完了しました。</span>`;
				} else if(data.status === 'pending') {
					resultDiv.style.background = '#fff8e1';
					resultDiv.style.border = '2px solid #ffb300';
					resultDiv.style.color = '#ff8f00';
					resultDiv.innerHTML = `【審査中】<br><span style="font-size:0.9rem; font-weight:normal;">現在、事業計画の精査および決済手続き中です。しばらくお待ちください。</span>`;
				} else if(data.status === 'rejected') {
					resultDiv.style.background = '#ffebee';
					resultDiv.style.border = '2px solid #f44336';
					resultDiv.style.color = '#c62828';
					resultDiv.innerHTML = `【見送り】<br><span style="font-size:0.9rem; font-weight:normal;">誠に残念ながら、今回は公庫の融資基準を満たさなかったため見送りとなりました。</span>`;
				} else {
					resultDiv.style.background = '#f5f5f5';
					resultDiv.style.border = '2px solid #9e9e9e';
					resultDiv.style.color = '#616161';
					resultDiv.innerHTML = `該当なし<br><span style="font-size:0.9rem; font-weight:normal;">入力された受付番号のデータが見つかりません。</span>`;
				}
			} catch (e) {
				alert("通信エラーが発生しました。");
			} finally {
				btn.innerText = "照会";
				btn.disabled = false;
			}
		}
		</script>
		<footer>
			このサイトは架空のものです。
		</footer>
	</main>
</body>
